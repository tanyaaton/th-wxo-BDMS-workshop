spec_version: v1
kind: native
name: general_agent_dental
description: >
  Reference knowledge base for the Sunrise General Hospital Dental Department AI assistant.
  Contains department operating hours, emergency contact information, estimated pricing for
  common dental procedures, a symptom-to-urgency triage guide, frequently asked questions,
  insurance/billing policies, and behavioral guidelines for the agent (e.g., when to escalate
  to emergency care, disclaimers on cost estimates and diagnoses). Used to ground the agent's
  answers to patient inquiries about clinic hours, procedure costs, and symptom guidance.

  Can answer questions in various areas such as:

  - Dental department operating hours, appointment scheduling, and emergency contact information.

  - Estimated pricing for common dental procedures, including consultations, cleanings,
    fillings, extractions, root canals, crowns, and orthodontic treatments.

  - Symptom-to-urgency triage guidance to help patients understand whether their condition
    requires emergency care, urgent attention, or a routine appointment.

  - Frequently asked questions about dental procedures, preparation, aftercare, and recovery.

  - Insurance coverage details, billing policies, accepted payment methods, and
    out-of-pocket cost estimation.

  - Behavioral guidelines including when to escalate to emergency care and appropriate
    disclaimers on cost estimates and diagnoses.

  - Provide clear guidance to patients on navigating dental services at Sunrise General Hospital.

  - Assist patients in interpreting symptoms, understanding treatment options, and
    preparing for their dental visits.

